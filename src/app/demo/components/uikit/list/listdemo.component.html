<div class="grid">
	<div class="col-12">
		<div class="card">
			<p-toast></p-toast>
			<h5>Your items</h5>
			<p-dataView #dv [value]="products" [paginator]="true" [rows]="9" filterBy="name" [sortField]="sortField" [sortOrder]="sortOrder" layout="grid" emptyMessage="No items in your cart">
				<ng-template pTemplate="header">
					<div class="grid grid-nogutter flex-column md:flex-row justify-content-between">
						<p-dropdown [options]="sortOptions" placeholder="Sort By Price" (onChange)="onSortChange($event)"></p-dropdown>
						<span class="p-input-icon-left mb-2 md:mb-0">
                            <i class="pi pi-search"></i>
                            <input type="search" pInputText placeholder="Search by Name" (input)="onFilter(dv, $event)">
                        </span>	
						<p-dataViewLayoutOptions></p-dataViewLayoutOptions>
					</div>
				</ng-template>

				<ng-template let-product pTemplate="listItem">
					<div class="col-12">
						<div class="flex flex-column md:flex-row align-items-center p-3 w-full">
							<img [src]="product.image" [alt]="product.name" class="my-4 md:my-0 w-9 md:w-10rem shadow-2 mr-5"/>
							<div class="flex-1 text-center md:text-left">
								<div class="font-bold text-2xl">{{product.name}}</div>
								<div class="mb-3">{{product.description}} {{product.chosenQuantity}}</div>
								<span class="sm product-badge status-outofstock">Quantity : {{product.chosenQuantity}}</span>
								<div class="flex align-items-center mt-3">
									<i class="pi pi-tag mr-2"></i>
									<span class="font-semibold">{{product.category.name}}</span>
								</div>
							</div>
							<div class="flex flex-row md:flex-column justify-content-between w-full md:w-auto align-items-center md:align-items-end mt-5 md:mt-0">
								<span class="text-2xl font-semibold mb-2 align-self-center md:align-self-end">${{product.price}}</span>
								<p-button icon="pi pi-times" label="Remove item" [disabled]="product.status === 'OUTOFSTOCK'" class="mb-3" styleClass="p-button-secondary"></p-button>
							</div>
						</div>
					</div>
				</ng-template>

				<ng-template let-product pTemplate="gridItem">
					<div class="col-12 md:col-4">
						<div class="card m-3 border-1 surface-border">
							<div class="flex align-items-center justify-content-between">
								<div class="flex align-items-center">
									<i class="pi pi-tag mr-2"></i>
									<span class="font-semibold">{{product.category.name}}</span>
								</div>
							</div>
							<div class="text-center">
								<img [src]="product.image" [alt]="product.name" class="w-9 shadow-2 my-3 mx-0"/>
								<div class="text-2xl font-bold">{{product.name}}</div>
								<div class="mb-3">{{product.description}}</div>
								<span class="sm:ml-2 product-badge status-outofstock">Quantity : {{product.chosenQuantity}}</span>
							</div>
							<div class="flex align-items-center justify-content-between">
								<span class="text-2xl font-semibold">${{product.price}}</span>
								<p-button icon="pi pi-times" [disabled]="product.status === 'OUTOFSTOCK'" styleClass="p-button-secondary"(onClick)="removeProduct(product)"></p-button>
							</div>
						</div>
					</div>
				</ng-template>
			</p-dataView>
			<div class="flex justify-content-center mt-6">
				<button pButton pRipple type="button" [disabled]="isConfirmDisabled" label="Confirm buying items" class="p-button-raised p-button-success" style="width: 250px;" (click)="confirmPurchase()"></button>
			</div>
		</div>
	</div>
</div>
